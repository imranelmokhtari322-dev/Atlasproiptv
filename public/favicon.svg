<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- TV screen shape -->
  <rect x="8" y="14" width="48" height="32" rx="4" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Screen inner -->
  <rect x="10" y="16" width="44" height="28" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Play triangle (amber) -->
  <polygon points="24,22 24,38 44,30" fill="url(#accent)"/>
  <!-- Stand -->
  <rect x="28" y="46" width="8" height="5" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="22" y="50" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>
