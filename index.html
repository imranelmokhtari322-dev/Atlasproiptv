<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SwivTV | #1 IPTV Nederland – 80.000+ Kanalen, 4K &amp; Onbeperkt Kijken</title>
    <meta name="description" content="SwivTV is de #1 IPTV provider van Nederland. Geniet van 80.000+ kanalen, 200.000+ films &amp; series in 4K/8K kwaliteit. Bestel vandaag je SwivTV abonnement en kijk alles op elk apparaat." />
    <meta name="keywords" content="SwivTV, swivtv, IPTV Nederland, IPTV abonnement, beste IPTV, 4K IPTV, IPTV kanalen, IPTV kopen, SwivTV abonnement, SwivTV IPTV" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="SwivTV" />
    <link rel="canonical" href="https://swivtv.nl/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://swivtv.nl/" />
    <meta property="og:site_name" content="SwivTV" />
    <meta property="og:title" content="SwivTV | #1 IPTV Nederland – 80.000+ Kanalen &amp; 4K Kwaliteit" />
    <meta property="og:description" content="SwivTV biedt de beste IPTV-ervaring in Nederland. 80.000+ kanalen, 200.000+ films &amp; series, 4K/8K kwaliteit en support 24/7. Probeer SwivTV vandaag." />
    <meta property="og:locale" content="nl_NL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwivTV | #1 IPTV Nederland" />
    <meta name="twitter:description" content="SwivTV – De beste IPTV provider van Nederland. 80.000+ kanalen, 4K kwaliteit, alle apparaten. Bestel nu." />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SwivTV",
      "url": "https://swivtv.nl/",
      "logo": "https://swivtv.nl/favicon.ico",
      "description": "SwivTV is de #1 IPTV provider van Nederland met 80.000+ kanalen en 200.000+ films & series in 4K kwaliteit.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["Dutch", "nl"]
      },
      "areaServed": ["NL", "BE"],
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SwivTV",
      "url": "https://swivtv.nl/",
      "description": "SwivTV IPTV – 80.000+ kanalen, 4K kwaliteit, alle apparaten. De #1 IPTV provider van Nederland.",
      "inLanguage": "nl-NL"
    }
    </script>

    <!-- JSON-LD: Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "SwivTV IPTV Abonnement",
      "provider": {
        "@type": "Organization",
        "name": "SwivTV"
      },
      "description": "SwivTV biedt premium IPTV-abonnementen met 80.000+ kanalen, 200.000+ films & series, 4K/8K kwaliteit en 24/7 support.",
      "areaServed": ["NL", "BE"],
      "offers": [
        {
          "@type": "Offer",
          "name": "SwivTV Basis – 12 Maanden",
          "price": "54.99",
          "priceCurrency": "EUR"
        },
        {
          "@type": "Offer",
          "name": "SwivTV Premium VIP+ – 12+3 Maanden",
          "price": "78.00",
          "priceCurrency": "EUR"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
